name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Core API Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - name: Run core contract tests
        run: |
          npx vitest run \
            src/lib/spClient.contract.spec.ts \
            src/app/config/__tests__/navigationConfig.contract.spec.ts

  registry-static-audit:
    name: Registry Static Audit
    needs: [contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - name: Run static registry audit
        run: npx tsx scripts/ops/registry-audit.ts

  registry-ssot:
    name: Registry SSOT Contract
    needs: [contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - name: Run SSOT contract test
        run: npx vitest run src/sharepoint/__tests__/spListRegistry.ssot.spec.ts

  registry-integration:
    name: Registry Integration
    needs: [contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - name: Run registry integration test
        run: npx vitest run src/features/sp/health/remediation/__tests__/registryIntegration.spec.ts

  registry-drift-probe:
    name: Registry Drift Probe
    needs: [contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - name: Run drift probe registry test
        run: npx vitest run src/sharepoint/__tests__/driftProbeRegistry.spec.ts

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    needs: [contracts, registry-static-audit, registry-ssot, registry-integration, registry-drift-probe]
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      VITE_MSAL_CLIENT_ID: dummy-client-id
      VITE_MSAL_TENANT_ID: dummy-tenant-id
      VITE_FEATURE_SCHEDULES: "1"
      E2E_FEATURE_SCHEDULE_NAV: "1"
      E2E_FEATURE_SCHEDULE_ACCEPTANCE: "1"
      E2E_FEATURE_SCHEDULE_WEEK_MONTH_TAB: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Guard Node 24 workflow baseline
        id: node24
        run: |
          node scripts/ci/check-node24-workflows.mjs \
            --json-output /tmp/node24-workflow-guard.json

      - name: Validate env (fail-fast)
        run: node scripts/validate-env.mjs
        env:
          ENV_VALIDATE_REQUIRED: VITE_MSAL_CLIENT_ID,VITE_MSAL_TENANT_ID
      
      - name: Install dependencies
        run: npm ci

      - name: "Guard: no legacy schedule references"
        run: |
          test ! -d src/features/schedule
          grep -rnP 'features/schedule(?!s)' src tests && exit 1 || true
          grep -rnP '@/features/schedule(?!s)' src tests && exit 1 || true
      
      - name: ESLint (enforce ARCHITECTURE_GUARDS)
        id: lint
        run: |
          echo "Running ESLint (includes no-restricted-imports for env module)..."
          npm run lint
          echo "✅ ESLint passed - ARCHITECTURE_GUARDS enforced"

      - name: Index Audit (Prevent Schema Drift)
        id: index_audit
        env:
          SP_TOKEN: ${{ secrets.SP_TOKEN }}
        run: |
          echo "Running SharePoint Index Governance Audit..."
          npx tsx scripts/ops/index-audit.ts
          echo "✅ Index Audit passed - Schema is stable"

      - name: ESLint boundaries report (non-blocking)
        id: lint_boundaries
        run: |
          echo "Running ESLint boundaries report (warn-only)..."
          npm run lint:boundaries
          echo "✅ Boundaries report generated"

      - name: Architecture dependency guard
        id: architecture_dependencies
        run: npm run arch:check
      
      - name: TypeScript type check
        id: typecheck
        run: |
          echo "Running TypeScript type check..."
          npm run typecheck
          echo "✅ TypeScript type check completed successfully"

  unit-test-shard:
    name: Unit Test (Shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    needs: [contracts, registry-static-audit, registry-ssot, registry-integration, registry-drift-probe]
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      VITE_MSAL_CLIENT_ID: dummy-client-id
      VITE_MSAL_TENANT_ID: dummy-tenant-id
      VITE_FEATURE_SCHEDULES: "1"
      E2E_FEATURE_SCHEDULE_NAV: "1"
      E2E_FEATURE_SCHEDULE_ACCEPTANCE: "1"
      E2E_FEATURE_SCHEDULE_WEEK_MONTH_TAB: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Validate env (fail-fast)
        run: node scripts/validate-env.mjs
        env:
          ENV_VALIDATE_REQUIRED: VITE_MSAL_CLIENT_ID,VITE_MSAL_TENANT_ID
      
      - name: Install dependencies
        run: npm ci

      - name: Run tests (Shard ${{ matrix.shard }}/3)
        id: tests
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          set -o pipefail
          echo "Running unit tests (Shard ${{ matrix.shard }}/3)..."
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR lane: running required unit subset (test:ci:required) with shard"
            npm run test:ci:required -- --shard=${{ matrix.shard }}/3 2>&1 | tee /tmp/vitest-ci.log
          else
            echo "Push lane: running full unit suite (test:ci) with shard"
            npm run test:ci -- --shard=${{ matrix.shard }}/3 2>&1 | tee /tmp/vitest-ci.log
          fi
          node scripts/ci/check-act-warnings.mjs /tmp/vitest-ci.log --json --json-output /tmp/act-warnings-ci.json
          echo "✅ Tests completed successfully"

      - name: Create/Update act warning regression issue
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ci/create-act-warning-issue.mjs \
            --summary /tmp/act-warnings-ci.json \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --sha "${{ github.sha }}"

  typecheck-and-test:
    name: TypeCheck & Test
    runs-on: ubuntu-latest
    needs: [typecheck, unit-test-shard]
    if: ${{ always() }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Classify unit shard outcomes
        id: classify-shards
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runAttempt = Number(context.runAttempt || 1);
            const currentAttempt = isNaN(runAttempt) ? 1 : runAttempt;

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner,
                repo,
                run_id: runId,
                per_page: 100,
              }
            );

            const unitShardJobs = jobs
              .filter((job) => /^Unit Test \(Shard \d+\/3\)/.test(job.name))
              .filter((job) => Number(job.run_attempt) === currentAttempt)
              .map((job) => ({
                name: job.name,
                id: job.id,
                conclusion: job.conclusion,
                status: job.status,
                attempt: job.run_attempt,
                url: job.html_url,
              }));

            const allowedConclusions = new Set(["success", "failure", "cancelled", "timed_out", "neutral", "skipped", "action_required", "startup_failure", "stopped"]);
            const canceledConclusions = new Set(["cancelled"]);
            const failureLikeConclusions = new Set(["failure", "timed_out", "action_required", "startup_failure", "stopped"]);

            const hasFailureLike = unitShardJobs.some((job) => failureLikeConclusions.has(job.conclusion));
            const hasCancelled = unitShardJobs.some((job) => canceledConclusions.has(job.conclusion));
            const hasSkipped = unitShardJobs.some((job) => job.conclusion === "skipped");
            const allSuccessOrCancelled = unitShardJobs.every(
              (job) => ["success", "cancelled"].includes(job.conclusion)
            );
            const hasSuccess = unitShardJobs.some((job) => job.conclusion === "success");
            const hasUnknownConclusion = unitShardJobs.some((job) => !allowedConclusions.has(job.conclusion));
            const hasIncomplete = unitShardJobs.some((job) => job.status !== "completed");

            let classification = "unit_shards_pass";
            let reason = "All shard jobs passed.";

            if (unitShardJobs.length === 0) {
              classification = "unit_shards_missing";
              reason = "No unit shard job entries found for current workflow run.";
            } else if (hasUnknownConclusion || hasIncomplete) {
              classification = "unit_shards_nonstandard";
              reason = "Unit shard has unexpected status/conclusion state.";
            } else if (hasFailureLike) {
              classification = "unit_shards_failure";
              reason = "Unit shard job failure detected.";
            } else if (hasSkipped) {
              classification = "unit_shards_skipped";
              reason = "Unit shard job skipped state detected.";
            } else if (hasCancelled && !(
              currentAttempt > 1 &&
              hasSuccess &&
              allSuccessOrCancelled
            )) {
              classification = "unit_shards_cancelled";
              reason = `Unit shard cancellations detected on initial attempt (${currentAttempt}).`;
            } else if (hasCancelled && currentAttempt > 1 && hasSuccess && allSuccessOrCancelled) {
              classification = "unit_shards_cancelled_rerun_side_effect";
              reason = "Unit shard cancellations are classified as rerun-side-effect and do not block merge by themselves.";
            }

            const unitShardCurrentJob = jobs.find(
              (job) => Number(job.run_attempt) === currentAttempt && job.name === context.job && job.status === "completed"
            );

            const payload = {
              run_id: runId,
              workflow: context.workflow,
              workflow_run_name: context.workflow,
              attempt: currentAttempt,
              job_name: context.job,
              job_id: unitShardCurrentJob ? unitShardCurrentJob.id : "",
              merge_commit_sha: context.payload.pull_request ? context.payload.pull_request.merge_commit_sha : context.sha,
              head_sha: context.sha,
              reason,
              classification,
              shards: unitShardJobs,
            };

            core.setOutput("classification", classification);
            core.setOutput("reason", reason);
            core.setOutput("shard_json", JSON.stringify(unitShardJobs));
            core.setOutput("payload", JSON.stringify(payload));

            await require("fs").promises.writeFile(
              `${process.env.GITHUB_WORKSPACE}/unit-shard-cancel-audit.json`,
              JSON.stringify(payload, null, 2)
            );

            await core.summary
              .addHeading("CI Unit shard cancellation classification")
              .addTable([
                [{ data: "field" }, { data: "value" }],
                ["workflow", payload.workflow],
                ["workflow attempt", payload.attempt],
                ["classification", payload.classification],
                ["run", payload.run_id],
                ["head sha", payload.head_sha],
              ])
              .addCodeBlock(JSON.stringify(payload, null, 2), "json")
              .write();

            const shouldFail = [
              "unit_shards_failure",
              "unit_shards_skipped",
              "unit_shards_cancelled",
              "unit_shards_missing",
              "unit_shards_nonstandard",
            ].includes(classification) || unitShardJobs.length === 0;

            if (shouldFail) {
              core.setFailed(`Unit shard aggregate check blocked: ${reason}`);
            }
      - name: Verify required CI dependencies
        if: always()
        run: |
          echo "typecheck result: ${{ needs.typecheck.result }}"
          echo "unit-test-shard result: ${{ needs.unit-test-shard.result }}"
          echo "unit shard classification: ${{ steps.classify-shards.outputs.classification }}"
          echo "unit shard reason: ${{ steps.classify-shards.outputs.reason }}"

          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "Error: typecheck failed, cancelled, or skipped."
            exit 1
          fi

          if [ "${{ steps.classify-shards.outputs.classification }}" = "unit_shards_failure" ] || \
             [ "${{ steps.classify-shards.outputs.classification }}" = "unit_shards_skipped" ] || \
             [ "${{ steps.classify-shards.outputs.classification }}" = "unit_shards_cancelled" ] || \
             [ "${{ steps.classify-shards.outputs.classification }}" = "unit_shards_missing" ] || \
             [ "${{ steps.classify-shards.outputs.classification }}" = "unit_shards_nonstandard" ]; then
            echo "Error: unit-test-shard failed, cancelled, or skipped."
            exit 1
          fi

          if [ "${{ steps.classify-shards.outputs.classification }}" != "unit_shards_pass" ] && \
             [ "${{ steps.classify-shards.outputs.classification }}" != "unit_shards_cancelled_rerun_side_effect" ]; then
            echo "Error: Unit shard classification not passable: ${{ steps.classify-shards.outputs.classification }}"
            exit 1
          fi

          echo "All required CI dependencies passed successfully!"

      - name: Upload unit shard audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-shard-cancel-audit-${{ github.run_number }}-${{ github.run_attempt }}
          path: unit-shard-cancel-audit.json
          retention-days: 14
          if-no-files-found: ignore
