name: E2E Deep Tests

# Deep tests run less frequently but provide comprehensive coverage
# These tests are more thorough and may take longer to complete
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # Run deep tests nightly at 2 AM UTC (11 AM JST)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_pattern:
        description: 'Test pattern to run (optional, defaults to all deep tests)'
        required: false
        default: ''
      environment:
        description: 'Environment to test against'
        required: false
        default: 'e2e'
        type: choice
        options:
          - e2e
          - preview

concurrency:
  group: e2e-deep-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_ENV: test
  # E2E Environment configuration
  VITE_E2E: '1'
  VITE_E2E_MSAL_MOCK: '1'
  VITE_E2E_FORCE_SCHEDULES_WRITE: '1'
  VITE_SKIP_LOGIN: '1'
  VITE_SKIP_SHAREPOINT: '1'
  VITE_DEMO_MODE: '1'
  VITE_DEV_HARNESS: '1'
  VITE_SCHEDULES_TZ: 'Asia/Tokyo'
  VITE_FEATURE_SCHEDULES: '1'
  VITE_MSAL_CLIENT_ID: 'dummy-client-id'
  VITE_MSAL_TENANT_ID: 'dummy-tenant-id'

jobs:
  deep-tests-chromium:
    name: Deep Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium only)
        id: install_playwright_browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        id: install_playwright_deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 10
        run: npx playwright install-deps chromium
      
      - name: Build application (preview mode)
        id: build_preview
        run: |
          npm run build
          node scripts/write-e2e-runtime-env.mjs
        env:
          NODE_ENV: 'production'
          VITE_E2E: '1'
          VITE_E2E_MSAL_MOCK: '1'
          VITE_SKIP_LOGIN: '1'
          VITE_SKIP_SHAREPOINT: '1'
          VITE_FORCE_SHAREPOINT: '0'
          VITE_DATA_PROVIDER: 'memory'
          VITE_DEMO_MODE: '1'
          VITE_FEATURE_SCHEDULES: '1'
          VITE_FEATURE_SCHEDULES_WEEK_V2: '1'
      
      - name: Start preview server
        id: start_preview
        env:
          NODE_ENV: 'production'
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 5173 --strictPort > /tmp/e2e-preview.log 2>&1 &
          echo "Preview server starting on port 5173"
      
      - name: Wait for preview server
        id: wait_preview
        run: npx wait-on http://127.0.0.1:5173 --timeout 60000

      - name: Capture bootstrap diagnostics
        id: bootstrap_diagnostics
        if: always()
        run: node scripts/ci/collect-e2e-bootstrap-diagnostics.mjs
        env:
          BOOTSTRAP_DIAG_URL: http://127.0.0.1:5173/schedules/week?tab=week
          BOOTSTRAP_DIAG_DIR: reports/e2e-bootstrap
        continue-on-error: true
      
      - name: Run deep E2E tests (non-smoke)
        id: deep_tests
        env:
          TZ: Asia/Tokyo
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_WEB_SERVER_URL: http://127.0.0.1:5173
          PLAYWRIGHT_SKIP_BUILD: '1'
          PLAYWRIGHT_JUNIT_OUTPUT: 'test-results/junit-e2e-deep.xml'
          PW_USE_PREVIEW: '1'
        run: |
          # Run all E2E tests excluding smoke tests
          if [ -n "${{ github.event.inputs.test_pattern }}" ]; then
            echo "Running custom test pattern: ${{ github.event.inputs.test_pattern }}"
            npx playwright test ${{ github.event.inputs.test_pattern }} \
              --config=playwright.config.ts \
              --project=chromium \
              --reporter=list,junit,json,html \
              --retries=2
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR lane: running schedule/day-focused deep tests only"
            npx playwright test \
              tests/e2e/schedule-*.spec.ts \
              tests/e2e/schedules*.spec.ts \
              tests/e2e/dashboard-schedule-flow.spec.ts \
              --config=playwright.config.ts \
              --project=chromium \
              --reporter=list,junit,json,html \
              --retries=1 \
              --workers=1
          else
            echo "Running all deep (non-smoke) tests"
            npx playwright test tests/e2e \
              --config=playwright.config.ts \
              --project=chromium \
              --grep-invert smoke \
              --reporter=list,junit,json,html \
              --retries=2
          fi
        continue-on-error: true
      
      - name: Generate test summary
        if: always()
        run: |
          echo "## E2E Deep Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** e2e" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.deep_tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Pattern:** ${{ github.event.inputs.test_pattern || 'All deep tests (non-smoke)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if JUnit report exists and parse it
          if [ -f "test-results/junit-e2e-deep.xml" ]; then
            tests=$(grep -o 'tests="[0-9]*"' test-results/junit-e2e-deep.xml | head -1 | grep -o '[0-9]*')
            failures=$(grep -o 'failures="[0-9]*"' test-results/junit-e2e-deep.xml | head -1 | grep -o '[0-9]*')
            echo "**Total Tests:** ${tests:-0}" >> $GITHUB_STEP_SUMMARY
            echo "**Failures:** ${failures:-0}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate Deep E2E taxonomy
        if: always()
        env:
          TAXONOMY_INPUT: test-results/results.json
          TAXONOMY_OUTPUT: reports/deep-e2e-taxonomy.json
        run: node scripts/ci/generate-deep-e2e-taxonomy.mjs --input "$TAXONOMY_INPUT" --output "$TAXONOMY_OUTPUT"

      - name: Classify deep test completion
        if: always()
        run: |
          cancellation_step="none"
          direct_cancellation="false"
          setup_failure_step="none"
          if [ "${{ steps.install_playwright_browsers.outcome }}" = "failure" ]; then
            setup_failure_step="Install Playwright (Chromium only)"
          elif [ "${{ steps.install_playwright_deps.outcome }}" = "failure" ]; then
            setup_failure_step="Install Playwright system dependencies"
          elif [ "${{ steps.build_preview.outcome }}" = "failure" ]; then
            setup_failure_step="Build application (preview mode)"
          elif [ "${{ steps.start_preview.outcome }}" = "failure" ]; then
            setup_failure_step="Start preview server"
          elif [ "${{ steps.wait_preview.outcome }}" = "failure" ]; then
            setup_failure_step="Wait for preview server"
          fi

          if [ "${{ steps.deep_tests.outcome }}" = "cancelled" ]; then
            direct_cancellation="true"
            if [ "${{ steps.wait_preview.outcome }}" = "cancelled" ]; then
              cancellation_step="Wait for preview server"
            elif [ "${{ steps.build_preview.outcome }}" = "cancelled" ]; then
              cancellation_step="Build application (preview mode)"
            elif [ "${{ steps.install_playwright_deps.outcome }}" = "cancelled" ]; then
              cancellation_step="Install Playwright system dependencies"
            elif [ "${{ steps.install_playwright_browsers.outcome }}" = "cancelled" ]; then
              cancellation_step="Install Playwright (Chromium only)"
            elif [ "${{ steps.deep_tests.outcome }}" = "cancelled" ]; then
              cancellation_step="Run deep E2E tests (non-smoke)"
            fi
          fi

          classification="deep_tests_pass"
          reason="Deep tests completed normally."
          if [ "${{ steps.deep_tests.outcome }}" = "failure" ]; then
            classification="deep_tests_failed"
            reason="Deep tests reported failure."
          elif [ "${setup_failure_step}" != "none" ]; then
            classification="deep_setup_failed"
            reason="Deep test setup failed: ${setup_failure_step}"
          elif [ "${{ steps.deep_tests.outcome }}" = "cancelled" ]; then
            classification="deep_tests_cancelled"
            reason="Deep test execution was cancelled: ${cancellation_step}"
          elif [ "${{ steps.deep_tests.outcome }}" = "skipped" ]; then
            classification="deep_tests_skipped"
            reason="Deep test step did not execute."
          fi

          cat <<EOF > deep-cancel-audit.json
          {
            "run_id": "${{ github.run_id }}",
            "attempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "job_name": "${{ github.job }}",
            "merge_commit_sha": "${{ github.event.pull_request.merge_commit_sha }}",
            "classification": "${classification}",
            "direct_cancellation": ${direct_cancellation},
            "cancellation_step": "${cancellation_step}",
            "setup_failure_step": "${setup_failure_step}",
            "deep_tests_outcome": "${{ steps.deep_tests.outcome }}",
            "concurrency_group": "e2e-deep-${{ github.ref }}",
            "event_name": "${{ github.event_name }}",
            "head_sha": "${{ github.sha }}"
          }
          EOF

          echo "## Deep E2E Cancellation Classification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Classification: \`${classification}\`" >> $GITHUB_STEP_SUMMARY
          echo "Reason: ${reason}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat deep-cancel-audit.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-deep-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-deep-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
            deep-cancel-audit.json
          retention-days: 14
          if-no-files-found: warn

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-bootstrap-diagnostics-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            reports/e2e-bootstrap/
            /tmp/e2e-preview.log
          retention-days: 14
          if-no-files-found: warn
      
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-e2e-deep-${{ github.run_number }}
          path: test-results/junit-e2e-deep.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Deep E2E taxonomy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taxonomy-deep-${{ github.run_id }}
          path: reports/deep-e2e-taxonomy.json
          retention-days: 14
          if-no-files-found: error
      
      - name: Upload artifacts on partial failure
        if: failure() || steps.deep_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts-deep-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
            logs/
          retention-days: 14
          if-no-files-found: warn
      
      - name: Check for flaky tests
        if: always()
        run: |
          echo "## Flaky Test Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if any tests were retried (indicator of flakiness)
          if [ -d "test-results" ]; then
            retried_tests=$(find test-results -name "*-retry*" -type d | wc -l)
            if [ "$retried_tests" -gt 0 ]; then
              echo "⚠️ **Warning:** $retried_tests test(s) required retry" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Please investigate these potentially flaky tests:" >> $GITHUB_STEP_SUMMARY
              find test-results -name "*-retry*" -type d | sed 's/test-results\//- /' >> $GITHUB_STEP_SUMMARY || true
            else
              echo "✅ No test retries detected - all tests passed on first attempt" >> $GITHUB_STEP_SUMMARY
            fi
          fi
      
      - name: Analyze flaky tests (detailed)
        if: always()
        env:
          FLAKY_EXIT_ON: NEVER
        run: node scripts/analyze-flaky-tests.mjs
        continue-on-error: true
      
      - name: Upload flaky test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-report-deep-${{ github.run_number }}
          path: reports/flaky-tests.md
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Fail job if tests failed
        if: steps.deep_tests.outcome == 'failure'
        run: exit 1

  deep-tests-integration:
    name: Deep Tests (Integration Scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 10
        run: npx playwright install-deps chromium
      
      - name: Run integration tests
        id: integration_tests
        run: |
          echo "Running integration scenario tests..."
          npx playwright test tests/e2e/dashboard-logic-integration.spec.ts \
            tests/e2e/cross-module-navigation.spec.ts \
            tests/e2e/integrated-resource-calendar.spec.ts \
            --config=playwright.config.ts \
            --project=chromium \
            --reporter=list,junit,html \
            --retries=1
        env:
          NODE_ENV: production
          PLAYWRIGHT_JUNIT_OUTPUT: 'test-results/junit-e2e-integration.xml'
        continue-on-error: true
      
      - name: Upload integration test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: warn
      
      - name: Fail job if tests failed
        if: steps.integration_tests.outcome == 'failure'
        run: exit 1
