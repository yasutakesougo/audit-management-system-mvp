name: integration (dailyops)

on:
  workflow_dispatch:
  schedule:
    # 02:30 JST = 17:30 UTC daily
    - cron: "30 17 * * *"

permissions:
  contents: read

concurrency:
  group: integration-dailyops
  cancel-in-progress: true

jobs:
  dailyops:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate env (fail-fast)
        run: node scripts/validate-env.mjs
        env:
          ENV_VALIDATE_REQUIRED: PW_STORAGE_STATE_B64,SHAREPOINT_SITE
          PW_STORAGE_STATE_B64: ${{ secrets.PW_STORAGE_STATE_B64 }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore Playwright storageState
        shell: bash
        run: |
          mkdir -p tests/.auth
          echo "${PW_STORAGE_STATE_B64}" | base64 -d > tests/.auth/storageState.json
          test -s tests/.auth/storageState.json
        env:
          PW_STORAGE_STATE_B64: ${{ secrets.PW_STORAGE_STATE_B64 }}

      - name: Verify SharePoint Auth (Pre-check)
        env:
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
        run: node scripts/verify-sharepoint-auth.mjs

      - name: Run integration (DailyOpsSignals)
        env:
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
        run: npm run ci:integration:dailyops

      - name: Upload test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-dailyops-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify Teams on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NOTIFY_REPOSITORY: ${{ github.repository }}
          NOTIFY_WORKFLOW: ${{ github.workflow }}
          NOTIFY_RUN_ID: ${{ github.run_id }}
          NOTIFY_RUN_NUMBER: ${{ github.run_number }}
          NOTIFY_REF_NAME: ${{ github.ref_name }}
          NOTIFY_SHA: ${{ github.sha }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi
          GUID=$(grep -RhoE 'sprequestguid[^A-Za-z0-9-]*[A-Za-z0-9-]+' test-results playwright-report 2>/dev/null | head -1 | sed -E 's/.*(sprequestguid[^A-Za-z0-9-]*)([A-Za-z0-9-]+).*/\2/' || true)
          [ -z "$GUID" ] && GUID="N/A"
          COMMIT_SHORT="${NOTIFY_SHA:0:7}"

          MSG=$(cat <<JSON
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "DailyOpsSignals integration failed",
            "themeColor": "FF0000",
            "title": "❌ DailyOpsSignals integration failed",
            "sections": [
              { "facts": [
                { "name": "Repo", "value": "${NOTIFY_REPOSITORY}" },
                { "name": "Workflow", "value": "${NOTIFY_WORKFLOW}" },
                { "name": "Run", "value": "${NOTIFY_RUN_NUMBER}" },
                { "name": "Branch", "value": "${NOTIFY_REF_NAME}" },
                { "name": "Commit", "value": "${COMMIT_SHORT}" },
                { "name": "sprequestguid", "value": "${GUID}" }
              ]}
            ]
            ,
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "Open workflow run",
                "targets": [
                  {
                    "os": "default",
                    "uri": "https://github.com/${NOTIFY_REPOSITORY}/actions/runs/${NOTIFY_RUN_ID}"
                  }
                ]
              }
            ]
          }
          JSON
          )

          curl -sS -X POST -H "Content-Type: application/json" -d "$MSG" "$TEAMS_WEBHOOK_URL"
