name: Nightly Runtime Patrol

on:
  schedule:
    # 毎日日本時間 4:00 (JST = UTC+9)
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runtime-patrol:
    name: Telemetry & Drift Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Nightly Runtime Patrol
        env:
          VITE_SP_TOKEN: ${{ secrets.SP_ACCESS_TOKEN }}
          VITE_SP_SITE_URL: ${{ secrets.SP_SITE_URL }}
        run: npx tsx scripts/ops/nightly-runtime-patrol.ts

      - name: Upload Patrol Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-runtime-summary-${{ github.run_number }}
          path: .nightly/
          if-no-files-found: error

      - name: Commit report to docs
        run: |
          mkdir -p docs/nightly-patrol
          TODAY=$(date -u +%F)
          cp .nightly/runtime-summary.md docs/nightly-patrol/runtime-summary-${TODAY}.md
          cp .nightly/runtime-summary.json docs/nightly-patrol/runtime-summary-${TODAY}.json
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add docs/nightly-patrol/runtime-summary-${TODAY}.md
          git add docs/nightly-patrol/runtime-summary-${TODAY}.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore(ops): nightly runtime patrol report for ${TODAY}"
          git push
