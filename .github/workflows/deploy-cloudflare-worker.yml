name: deploy-cloudflare-worker

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Exact origin/main SHA to deploy"
        required: true
        type: string
      confirm_production_deploy:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify deploy candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'

    env:
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      CONFIRM_PRODUCTION_DEPLOY: ${{ inputs.confirm_production_deploy }}

    steps:
      - name: Checkout main candidate
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify fixed clean main SHA
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --prune
          HEAD_SHA="$(git rev-parse HEAD)"
          ORIGIN_MAIN_SHA="$(git rev-parse origin/main)"

          echo "HEAD=${HEAD_SHA}"
          echo "origin/main=${ORIGIN_MAIN_SHA}"
          echo "expected=${EXPECTED_SHA}"

          if [ "${HEAD_SHA}" != "${ORIGIN_MAIN_SHA}" ]; then
            echo "HEAD must match origin/main"
            exit 1
          fi

          if [ "${HEAD_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "HEAD does not match expected_sha"
            exit 1
          fi

          if [ -n "$(git status --short)" ]; then
            git status --short
            echo "Working tree must be clean before deploy"
            exit 1
          fi

      - name: Validate production confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [ "${CONFIRM_PRODUCTION_DEPLOY}" != "DEPLOY" ]; then
            echo "confirm_production_deploy must be exactly DEPLOY"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show pinned Wrangler version
        run: npx wrangler --version

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Typecheck
        run: npm run typecheck

      - name: Required regression tests
        run: npm run test:ci:required

      - name: Build
        run: npm run build

      - name: Bundle report
        run: npm run bundle:check

      - name: Bundle guard
        run: npm run bundle:assert

      - name: Cloudflare deploy dry-run
        run: npx wrangler deploy --dry-run

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    environment:
      name: cloudflare-production

    env:
      DEPLOY_TARGET: cloudflare
      VITE_SP_ENABLED: "1"
      VITE_APP_ENV: "production"
      VITE_SP_RESOURCE: ${{ secrets.VITE_SP_RESOURCE }}
      VITE_SP_SITE_RELATIVE: ${{ secrets.VITE_SP_SITE_RELATIVE }}
      VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID != '' && secrets.VITE_MSAL_CLIENT_ID || secrets.AAD_APP_ID }}
      VITE_MSAL_TENANT_ID: ${{ secrets.VITE_MSAL_TENANT_ID != '' && secrets.VITE_MSAL_TENANT_ID || secrets.AAD_TENANT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      EXPECTED_SHA: ${{ inputs.expected_sha }}

    steps:
      - name: Checkout main candidate
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify fixed clean main SHA
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --prune
          HEAD_SHA="$(git rev-parse HEAD)"
          ORIGIN_MAIN_SHA="$(git rev-parse origin/main)"

          echo "HEAD=${HEAD_SHA}"
          echo "origin/main=${ORIGIN_MAIN_SHA}"
          echo "expected=${EXPECTED_SHA}"

          if [ "${HEAD_SHA}" != "${ORIGIN_MAIN_SHA}" ]; then
            echo "HEAD must match origin/main"
            exit 1
          fi

          if [ "${HEAD_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "HEAD does not match expected_sha"
            exit 1
          fi

          if [ -n "$(git status --short)" ]; then
            git status --short
            echo "Working tree must be clean before deploy"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production env
        run: npm run check:env

      - name: Show pinned Wrangler version
        run: npx wrangler --version

      - name: Build deploy artifacts
        run: npm run build:ci

      - name: Cloudflare deploy dry-run
        run: npx wrangler deploy --dry-run

      - name: Deploy Worker
        run: npx wrangler deploy
