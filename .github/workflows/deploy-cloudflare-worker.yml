name: deploy-cloudflare-worker

on:
  workflow_dispatch:
    inputs:
      release_scope:
        description: "Deployment scope: full or kiosk"
        type: choice
        default: full
        required: false
        options:
          - full
          - kiosk
      expected_sha:
        description: "Exact origin/main SHA to deploy"
        required: true
        type: string
      confirm_production_deploy:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify deploy candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'

    env:
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      CONFIRM_PRODUCTION_DEPLOY: ${{ inputs.confirm_production_deploy }}
      RELEASE_SCOPE: ${{ inputs.release_scope }}

    steps:
      - name: Checkout main candidate
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify fixed clean main SHA
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --prune
          HEAD_SHA="$(git rev-parse HEAD)"
          ORIGIN_MAIN_SHA="$(git rev-parse origin/main)"

          echo "HEAD=${HEAD_SHA}"
          echo "origin/main=${ORIGIN_MAIN_SHA}"
          echo "expected=${EXPECTED_SHA}"

          if [ "${HEAD_SHA}" != "${ORIGIN_MAIN_SHA}" ]; then
            echo "HEAD must match origin/main"
            exit 1
          fi

          if [ "${HEAD_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "HEAD does not match expected_sha"
            exit 1
          fi

          if [ -n "$(git status --short)" ]; then
            git status --short
            echo "Working tree must be clean before deploy"
            exit 1
          fi

      - name: Validate production confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RELEASE_SCOPE}" = "kiosk" ]; then
            if [ "${CONFIRM_PRODUCTION_DEPLOY}" != "DEPLOY_KIOSK" ]; then
              echo "confirm_production_deploy must be exactly DEPLOY_KIOSK"
              exit 1
            fi
            exit 0
          fi

          if [ "${CONFIRM_PRODUCTION_DEPLOY}" != "DEPLOY" ]; then
            echo "confirm_production_deploy must be exactly DEPLOY"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show pinned Wrangler version
        run: npx wrangler --version

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Typecheck
        run: npm run typecheck

      - name: Required regression tests
        if: env.RELEASE_SCOPE == 'full'
        run: npm run test:ci:required

      - name: Required regression tests (kiosk scope)
        if: env.RELEASE_SCOPE == 'kiosk'
        run: npm run test:ci:kiosk-release

      - name: Build
        run: npm run build

      - name: Bundle report
        run: npm run bundle:check

      - name: Bundle guard
        run: npm run bundle:assert

      - name: Cloudflare deploy dry-run
        run: npx wrangler deploy --dry-run

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    environment:
      name: cloudflare-production

    env:
      DEPLOY_TARGET: cloudflare
      VITE_SP_ENABLED: "1"
      VITE_APP_ENV: "production"
      VITE_SP_RESOURCE: ${{ secrets.VITE_SP_RESOURCE }}
      VITE_SP_SITE_RELATIVE: ${{ secrets.VITE_SP_SITE_RELATIVE }}
      VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID != '' && secrets.VITE_MSAL_CLIENT_ID || secrets.AAD_APP_ID }}
      VITE_MSAL_TENANT_ID: ${{ secrets.VITE_MSAL_TENANT_ID != '' && secrets.VITE_MSAL_TENANT_ID || secrets.AAD_TENANT_ID }}
      VITE_MSAL_REDIRECT_URI: ${{ secrets.VITE_MSAL_REDIRECT_URI != '' && secrets.VITE_MSAL_REDIRECT_URI || secrets.VITE_AZURE_AD_REDIRECT_URI }}
      VITE_SP_USE_PROXY: "1"
      VITE_SP_LIST_BILLING_ORDERS: ${{ vars.VITE_SP_LIST_BILLING_ORDERS || 'c4be5492-9803-4fc6-ac7e-82d10e95ff6d' }}
      VITE_SP_LIST_BILLING_ORDERS_SITE_RELATIVE: ${{ vars.VITE_SP_LIST_BILLING_ORDERS_SITE_RELATIVE || '/sites/2' }}
      EXPECTED_SHA: ${{ inputs.expected_sha }}

    steps:
      - name: Checkout main candidate
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify fixed clean main SHA
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --prune
          HEAD_SHA="$(git rev-parse HEAD)"
          ORIGIN_MAIN_SHA="$(git rev-parse origin/main)"

          echo "HEAD=${HEAD_SHA}"
          echo "origin/main=${ORIGIN_MAIN_SHA}"
          echo "expected=${EXPECTED_SHA}"

          if [ "${HEAD_SHA}" != "${ORIGIN_MAIN_SHA}" ]; then
            echo "HEAD must match origin/main"
            exit 1
          fi

          if [ "${HEAD_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "HEAD does not match expected_sha"
            exit 1
          fi

          if [ -n "$(git status --short)" ]; then
            git status --short
            echo "Working tree must be clean before deploy"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production env
        shell: bash
        run: |
          set -euo pipefail

          npm run check:env

          required=(
            VITE_SP_RESOURCE
            VITE_SP_SITE_RELATIVE
            VITE_MSAL_CLIENT_ID
            VITE_MSAL_TENANT_ID
            VITE_MSAL_REDIRECT_URI
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::${key} is required for production deploy"
              exit 1
            fi
          done

          if echo "${VITE_MSAL_CLIENT_ID}" | grep -qi 'dummy'; then
            echo "::error::VITE_MSAL_CLIENT_ID must not contain dummy"
            exit 1
          fi

          if echo "${VITE_MSAL_TENANT_ID}" | grep -qi 'dummy'; then
            echo "::error::VITE_MSAL_TENANT_ID must not contain dummy"
            exit 1
          fi

          node -e "new URL(process.env.VITE_MSAL_REDIRECT_URI)"

      - name: Show pinned Wrangler version
        run: npx wrangler --version

      - name: Build deploy artifacts
        run: npm run build:ci

      - name: Prepare production Wrangler config
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          const vars = {
            VITE_SP_RESOURCE: process.env.VITE_SP_RESOURCE,
            VITE_SP_SITE_RELATIVE: process.env.VITE_SP_SITE_RELATIVE,
            VITE_SP_USE_PROXY: process.env.VITE_SP_USE_PROXY,
            VITE_SP_LIST_BILLING_ORDERS: process.env.VITE_SP_LIST_BILLING_ORDERS,
            VITE_SP_LIST_BILLING_ORDERS_SITE_RELATIVE: process.env.VITE_SP_LIST_BILLING_ORDERS_SITE_RELATIVE,
          };

          const tomlString = (value) => JSON.stringify(String(value ?? ''));
          const lines = [
            '# Generated in CI from the approved GitHub Environment.',
            'name = "audit-management-system-mvp"',
            'compatibility_date = "2026-01-17"',
            'main = "src/worker.ts"',
            'keep_vars = true',
            '',
            '[vars]',
            ...Object.entries(vars).map(([key, value]) => `${key} = ${tomlString(value)}`),
            '',
            '[assets]',
            'directory = "./dist"',
            'binding = "ASSETS"',
            'run_worker_first = true',
            '',
          ];

          fs.writeFileSync('wrangler.production.toml', `${lines.join('\n')}\n`);
          NODE

      - name: Cloudflare deploy dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.production.toml --dry-run --keep-vars

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.production.toml --keep-vars
