name: Quality Gates
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      ref:
        description: "Target ref (branch or tag)"
        required: false
        default: ""

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    outputs:
      ci_full: ${{ steps.changes.outputs.ci_full }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    env:
      # Phase 2: E2E feature flag guards
      E2E_FEATURE_SCHEDULE_NAV: "1"
      E2E_FEATURE_SCHEDULE_ACCEPTANCE: "1"
      E2E_FEATURE_SCHEDULE_WEEK_MONTH_TAB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.head_ref || github.ref }}
      - name: Detect changes (paths-filter)
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            playwright:
              - 'src/**'
              - 'tests/e2e/**'
              - 'playwright*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'package-lock.json'
              - 'yarn.lock'
              - '.github/workflows/**'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'public/**'
            perf:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.*'
              - 'package.json'
              - 'package-lock.json'
              - 'pnpm-lock.yaml'
              - 'yarn.lock'
              - '.github/workflows/test.yml'
              - '!docs/**'
              - '!**/*.md'
            ci_full:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'pnpm-lock.yaml'
              - 'yarn.lock'
              - 'vitest.config.*'
              - '.github/workflows/test.yml'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true')
        run: npx playwright install --with-deps
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Schedules mini tests (optional)
        run: npm run test:schedule:mini
        continue-on-error: true
      - name: Attendance mini tests (optional)
        run: npm run test:attendance:mini
        continue-on-error: true
      - name: Daily mini tests (optional)
        run: npm run test:daily:mini
        continue-on-error: true
      - name: Users mini tests (optional)
        run: npm run test:users:mini
        continue-on-error: true
      - name: Nurse mini tests (optional)
        run: npm run test:nurse:mini
        continue-on-error: true
      - name: Test (PR)
        id: test_pr
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          npm run test:ci:required 2>&1 | tee /tmp/vitest-required.log
          node scripts/ci/check-act-warnings.mjs /tmp/vitest-required.log --json --json-output /tmp/act-warnings-required.json
      - name: Create/Update act warning regression issue (PR)
        id: act_warning_required
        if: ${{ failure() && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ci/create-act-warning-issue.mjs \
            --summary /tmp/act-warnings-required.json \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --sha "${{ github.sha }}"

      - name: Free port 5173 (best-effort, lsof OR fuser)
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true')
        run: |
          (command -v lsof >/dev/null && lsof -ti :5173 | xargs -r kill -9) || true
          (command -v fuser >/dev/null && fuser -k 5173/tcp) || true
          sleep 1
      - name: Start dev server (5173, strict)
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true')
        run: |
          nohup npm run dev:5173 </dev/null > /tmp/vite-5173.log 2>&1 &
          echo "Vite starting on port 5173..."
          sleep 2
          echo "=== vite log (head -20, sanity check) ==="
          head -20 /tmp/vite-5173.log || true
      - name: Wait for dev server (5173)
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true')
        run: |
          npx wait-on http://127.0.0.1:5173/ --timeout 60000
          curl -I http://127.0.0.1:5173/ | head -5
      - name: Debug server logs on failure (5173)
        if: failure() && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true'))
        run: |
          echo "=== /tmp/vite-5173.log (tail -200) ==="
          tail -200 /tmp/vite-5173.log || true
      - name: Playwright E2E
        id: playwright_e2e
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true')
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"
          VITE_SKIP_SHAREPOINT: "1"
          VITE_MSAL_CLIENT_ID: "dummy"
          VITE_MSAL_TENANT_ID: "dummy"
          VITE_SCHEDULES_TZ: "Asia/Tokyo"
          VITE_SP_SCOPE_DEFAULT: ${{ secrets.VITE_SP_SCOPE_DEFAULT }}
          VITE_SP_RESOURCE: ${{ vars.VITE_SP_RESOURCE }}
          VITE_SP_SITE_RELATIVE: ${{ vars.VITE_SP_SITE_RELATIVE }}
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          export VITE_SP_RESOURCE="${VITE_SP_RESOURCE:-https://contoso.sharepoint.com}"
          export VITE_SP_SITE_RELATIVE="${VITE_SP_SITE_RELATIVE:-/sites/Audit}"
          export VITE_SP_SCOPE_DEFAULT="${VITE_SP_SCOPE_DEFAULT:-https://contoso.sharepoint.com/AllSites.Read}"

          echo "VITE_SP_SCOPE_DEFAULT set? -> $([ -n "${VITE_SP_SCOPE_DEFAULT}" ] && echo yes || echo no)"
          echo "VITE_SP_SCOPE_DEFAULT length -> ${#VITE_SP_SCOPE_DEFAULT}"
          echo "VITE_SP_RESOURCE -> ${VITE_SP_RESOURCE}"
          echo "VITE_SP_SITE_RELATIVE -> ${VITE_SP_SITE_RELATIVE}"

          # Run only the lightest Playwright smoke to keep Quality Gates aligned with this PR scope.
          npx playwright test tests/e2e/basic-smoke.spec.ts --config=playwright.smoke.config.ts --project=smoke
      - name: a11y CI integration tests (complex pages)
        id: a11y_ci_integration
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.playwright == 'true')
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"
          VITE_SKIP_SHAREPOINT: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: |
          npx playwright test tests/e2e/a11y-complex-page.spec.ts --project=chromium --reporter=line
      - name: Upload a11y test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
      - name: Upload a11y baseline (json)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-baseline
          path: test-results/a11y-baseline/**/*.json
          if-no-files-found: ignore
      - name: Perf report (LHCI + Web Vitals)
        if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && steps.changes.outputs.perf == 'true')
        run: npm run -s ci:perf-report
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"
          VITE_SKIP_SHAREPOINT: "1"
          VITE_DEMO_MODE: "1"
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      - name: Upload perf summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary
          path: |
            reports/perf-summary.md
            reports/perf-summary.json
            lhci-results.json

      - name: Classify quality job completion
        if: always()
        run: |
          cancellation_step="none"
          direct_cancellation="false"

          if [ "${{ steps.test_pr.outcome }}" = "cancelled" ]; then
            direct_cancellation="true"
            cancellation_step="Test (PR)"
          elif [ "${{ steps.playwright_e2e.outcome }}" = "cancelled" ]; then
            direct_cancellation="true"
            cancellation_step="Playwright E2E"
          elif [ "${{ steps.a11y_ci_integration.outcome }}" = "cancelled" ]; then
            direct_cancellation="true"
            cancellation_step="a11y CI integration tests"
          fi

          case "${{ steps.test_pr.outcome }}|${{ steps.playwright_e2e.outcome }}|${{ steps.a11y_ci_integration.outcome }}" in
            *failure*)
              classification="quality_failed"
              reason="One or more required quality steps failed."
              ;;
            *cancelled*)
              classification="quality_cancelled"
              reason="Cancellation detected: ${cancellation_step}"
              ;;
            *)
              classification="quality_pass"
              reason="Quality workflow completed without failure/cancellation."
              ;;
          esac

          cat <<EOF > quality-cancel-audit.json
          {
            "run_id": "${{ github.run_id }}",
            "attempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "job_name": "${{ github.job }}",
            "merge_commit_sha": "${{ github.event.pull_request.merge_commit_sha }}",
            "classification": "${classification}",
            "direct_cancellation": ${direct_cancellation},
            "cancellation_step": "${cancellation_step}",
            "test_pr_outcome": "${{ steps.test_pr.outcome }}",
            "playwright_e2e_outcome": "${{ steps.playwright_e2e.outcome }}",
            "a11y_ci_integration_outcome": "${{ steps.a11y_ci_integration.outcome }}",
            "head_sha": "${{ github.sha }}"
          }
          EOF

          echo "## Quality completion classification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Classification: \`${classification}\`" >> $GITHUB_STEP_SUMMARY
          echo "Reason: ${reason}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat quality-cancel-audit.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload quality completion artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-cancel-audit-${{ github.run_number }}-${{ github.run_attempt }}
          path: quality-cancel-audit.json
          retention-days: 14
          if-no-files-found: ignore


  quality_extended:
    name: quality_extended
    needs: quality
    if: ${{ github.event_name == 'pull_request' && needs.quality.outputs.ci_full == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    env:
      E2E_FEATURE_SCHEDULE_NAV: "1"
      E2E_FEATURE_SCHEDULE_ACCEPTANCE: "1"
      E2E_FEATURE_SCHEDULE_WEEK_MONTH_TAB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Test (ci full)
        id: test_ci_full
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee /tmp/vitest-full.log
          node scripts/ci/check-act-warnings.mjs /tmp/vitest-full.log --json --json-output /tmp/act-warnings-full.json
      - name: Create/Update act warning regression issue (ci full)
        id: act_warning_full
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ci/create-act-warning-issue.mjs \
            --summary /tmp/act-warnings-full.json \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --sha "${{ github.sha }}"

      - name: Classify quality_extended completion
        if: always()
        run: |
          cancellation_step="none"
          direct_cancellation="false"

          if [ "${{ steps.test_ci_full.outcome }}" = "cancelled" ]; then
            direct_cancellation="true"
            cancellation_step="Test (ci full)"
          elif [ "${{ steps.act_warning_full.outcome }}" = "cancelled" ]; then
            direct_cancellation="true"
            cancellation_step="Create/Update act warning regression issue (ci full)"
          fi

          if [ "${{ steps.test_ci_full.outcome }}" = "failure" ]; then
            classification="quality_extended_failure"
            reason="Unit/lint/test suite failed in quality_extended."
          elif [ "${{ steps.test_ci_full.outcome }}" = "cancelled" ]; then
            classification="quality_extended_cancelled"
            reason="quality_extended cancelled while running test suite: ${cancellation_step}"
          else
            classification="quality_extended_pass"
            reason="quality_extended completed."
          fi

          cat <<EOF > quality-extended-cancel-audit.json
          {
            "run_id": "${{ github.run_id }}",
            "attempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "job_name": "${{ github.job }}",
            "merge_commit_sha": "${{ github.event.pull_request.merge_commit_sha }}",
            "classification": "${classification}",
            "direct_cancellation": ${direct_cancellation},
            "cancellation_step": "${cancellation_step}",
            "test_ci_full_outcome": "${{ steps.test_ci_full.outcome }}",
            "act_warning_full_outcome": "${{ steps.act_warning_full.outcome }}",
            "head_sha": "${{ github.sha }}"
          }
          EOF

          echo "## Quality extended completion classification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Classification: \`${classification}\`" >> $GITHUB_STEP_SUMMARY
          echo "Reason: ${reason}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat quality-extended-cancel-audit.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload quality_extended completion artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-extended-cancel-audit-${{ github.run_number }}-${{ github.run_attempt }}
          path: quality-extended-cancel-audit.json
          retention-days: 14
          if-no-files-found: ignore

  canary:
    runs-on: ubuntu-latest
    needs: quality
    # Run the deterministic mock/demo canary on PRs as well as main so the
    # dedicated lane is verified before merge.
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    env:
      VITE_FEATURE_SCHEDULES: "true"
      # Canary is a deterministic mock/demo lane. Keep these flags at job
      # scope so the already-running Vite server receives the same runtime
      # configuration as the Playwright and LHCI steps.
      VITE_E2E: "1"
      VITE_E2E_MSAL_MOCK: "1"
      VITE_SKIP_LOGIN: "1"
      VITE_SKIP_SHAREPOINT: "1"
      VITE_FORCE_SHAREPOINT: "0"
      VITE_DEMO_MODE: "1"
      VITE_DATA_PROVIDER: "memory"
      VITE_MSAL_CLIENT_ID: "dummy"
      VITE_MSAL_TENANT_ID: "dummy"
      NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      VITE_SP_SCOPE_DEFAULT: ${{ vars.VITE_SP_SCOPE_DEFAULT || (vars.VITE_SP_RESOURCE && format('{0}/.default', vars.VITE_SP_RESOURCE)) || secrets.VITE_SP_SCOPE_DEFAULT || 'https://contoso.sharepoint.com/.default' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Free port 5173 (best-effort, lsof OR fuser)
        run: |
          (command -v lsof >/dev/null && lsof -ti :5173 | xargs -r kill -9) || true
          (command -v fuser >/dev/null && fuser -k 5173/tcp) || true
          sleep 1
      - name: Start dev server (5173, strict)
        run: |
          echo "Canary runtime: provider=${VITE_DATA_PROVIDER}, skipLogin=${VITE_SKIP_LOGIN}, skipSharePoint=${VITE_SKIP_SHAREPOINT}, msalMock=${VITE_E2E_MSAL_MOCK}"
          {
            echo "## Canary runtime configuration"
            echo "- provider: `${VITE_DATA_PROVIDER}`"
            echo "- skip login: `${VITE_SKIP_LOGIN}`"
            echo "- skip SharePoint: `${VITE_SKIP_SHAREPOINT}`"
            echo "- MSAL mock: `${VITE_E2E_MSAL_MOCK}`"
          } >> "$GITHUB_STEP_SUMMARY"
          nohup npm run dev:5173 </dev/null > /tmp/vite-5173.log 2>&1 &
          echo "Vite starting on port 5173..."
          sleep 2
          echo "=== vite log (head -20, sanity check) ==="
          head -20 /tmp/vite-5173.log || true
      - name: Wait for dev server (5173)
        run: |
          npx wait-on http://127.0.0.1:5173/ --timeout 60000
          curl -I http://127.0.0.1:5173/ | head -5
      - name: Debug server logs on failure (5173)
        if: failure()
        run: |
          echo "=== /tmp/vite-5173.log (tail -200) ==="
          tail -200 /tmp/vite-5173.log || true
      - name: Canary E2E
        id: canary_e2e
        run: |
          set +e
          set -o pipefail
          mkdir -p reports/quality-gates

          # Do not mix auth/storage-state or real SharePoint specs into the
          # mock/demo canary. Those belong to the dedicated integration lane.
          npx playwright test tests/e2e/app-shell.smoke.spec.ts \
            --config=playwright.config.ts \
            --project=chromium \
            --reporter=list 2>&1 | tee reports/quality-gates/canary-e2e.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          VITE_SCHEDULES_TZ: "Asia/Tokyo"
          VITE_SP_SCOPE_DEFAULT: ${{ secrets.VITE_SP_SCOPE_DEFAULT }}
          VITE_SP_RESOURCE: ${{ vars.VITE_SP_RESOURCE }}
          VITE_SP_SITE_RELATIVE: ${{ vars.VITE_SP_SITE_RELATIVE }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      - name: Canary LHCI
        id: canary_lhci
        if: always()
        run: |
          set +e
          set -o pipefail
          mkdir -p reports/quality-gates

          npm run ci:lh 2>&1 | tee reports/quality-gates/canary-lhci.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"
          VITE_SKIP_SHAREPOINT: "1"
          VITE_MSAL_CLIENT_ID: "dummy"
          VITE_MSAL_TENANT_ID: "dummy"
          VITE_SCHEDULES_TZ: "Asia/Tokyo"
          VITE_SP_SCOPE_DEFAULT: ${{ secrets.VITE_SP_SCOPE_DEFAULT }}
          VITE_SP_RESOURCE: ${{ vars.VITE_SP_RESOURCE }}
          VITE_SP_SITE_RELATIVE: ${{ vars.VITE_SP_SITE_RELATIVE }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      - name: Canary perf summary
        id: canary_summary
        if: always()
        run: |
          set +e
          set -o pipefail
          mkdir -p reports/quality-gates

          npm run perf:summary 2>&1 | tee reports/quality-gates/canary-summary.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"
          VITE_SKIP_SHAREPOINT: "1"
          VITE_MSAL_CLIENT_ID: "dummy"
          VITE_MSAL_TENANT_ID: "dummy"
          VITE_SCHEDULES_TZ: "Asia/Tokyo"
          VITE_SP_SCOPE_DEFAULT: ${{ secrets.VITE_SP_SCOPE_DEFAULT }}
          VITE_SP_RESOURCE: ${{ vars.VITE_SP_RESOURCE }}
          VITE_SP_SITE_RELATIVE: ${{ vars.VITE_SP_SITE_RELATIVE }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      - name: Classify canary failure
        id: canary
        if: always()
        run: node scripts/ci/classify-canary.mjs
        env:
          CANARY_E2E_EXIT_CODE: ${{ steps.canary_e2e.outputs.exit_code || '1' }}
          CANARY_LHCI_EXIT_CODE: ${{ steps.canary_lhci.outputs.exit_code || '1' }}
          CANARY_SUMMARY_EXIT_CODE: ${{ steps.canary_summary.outputs.exit_code || '1' }}
          CANARY_E2E_LOG_PATH: reports/quality-gates/canary-e2e.log
      - name: Upload canary classification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-classification-${{ github.run_number }}-${{ github.run_attempt }}
          path: reports/quality-gates/
          retention-days: 14
          if-no-files-found: warn
      - name: Canary final gate
        if: always()
        run: |
          if [ "${CANARY_SHOULD_FAIL}" != "false" ]; then
            echo "Canary classified as ${CANARY_CLASSIFICATION:-unknown}"
            exit "${CANARY_EXIT_CODE:-1}"
          fi
        env:
          CANARY_SHOULD_FAIL: ${{ steps.canary.outputs.should_fail || 'true' }}
          CANARY_CLASSIFICATION: ${{ steps.canary.outputs.classification || 'unknown' }}
          CANARY_EXIT_CODE: ${{ steps.canary.outputs.exit_code || '1' }}
      - name: Notify canary failure
        if: failure()
        run: node scripts/notify.mjs --only-on-fail --title "canary(schedule)" --files reports/quality-gates/canary-classification.md,reports/perf-summary.md
        env:
          NOTIFY_LAST_EXIT_CODE: ${{ steps.canary.outputs.exit_code }}
