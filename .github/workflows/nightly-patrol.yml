name: Nightly Patrol

on:
  schedule:
    # JST 03:15 = UTC 18:15 (nightly-health の15分後)
    - cron: '15 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: nightly-patrol
  cancel-in-progress: false

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare directories
        run: |
          mkdir -p docs/nightly-patrol
          mkdir -p scripts/ops

      - name: Core API Contract Patrol
        run: node scripts/ops/contract-patrol.mjs
        env:
          CI: true

      - name: Index Audit
        continue-on-error: true
        run: npx tsx scripts/ops/index-audit.ts
        env:
          CI: true
          SP_TOKEN: ${{ secrets.SP_TOKEN }}
          VITE_SP_RESOURCE: ${{ secrets.VITE_SP_RESOURCE || 'https://contoso.sharepoint.com' }}
          VITE_SP_SITE_RELATIVE: ${{ secrets.VITE_SP_SITE_RELATIVE || '/sites/Audit' }}

      - name: Nightly coverage scan
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          set -o pipefail
          npm run test:coverage -- --reporter=default
          if [ -d coverage ]; then
            mkdir -p docs/nightly-patrol
            cp coverage/coverage-summary.json docs/nightly-patrol/coverage-summary.json
            cp coverage/lcov.info docs/nightly-patrol/lcov.info
          fi

      - name: Nightly act warning scan
        id: act_scan
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:ci:required 2>&1 | tee /tmp/vitest-nightly-act.log
          node scripts/ci/check-act-warnings.mjs /tmp/vitest-nightly-act.log --json --json-output /tmp/act-warnings-nightly.json

      - name: Create/Update act warning regression issue
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ci/create-act-warning-issue.mjs \
            --summary /tmp/act-warnings-nightly.json \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --sha "${{ github.sha }}"

      - name: Detect open act warning issue
        id: act_issue
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          json=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search 'in:title "CI: act(...) warning regression detected"' \
            --limit 1 \
            --json number,url)
          count=$(node -e "const d=JSON.parse(process.argv[1]);console.log(d.length);" "$json")
          url=$(node -e "const d=JSON.parse(process.argv[1]);console.log(d[0]?.url || '');" "$json")
          echo "open_count=${count}" >> "$GITHUB_OUTPUT"
          echo "open_url=${url}" >> "$GITHUB_OUTPUT"

      - name: Run patrol scan
        env:
          ACT_WARNING_SUMMARY_PATH: /tmp/act-warnings-nightly.json
          ACT_WARNING_OPEN_ISSUE_COUNT: ${{ steps.act_issue.outputs.open_count }}
          ACT_WARNING_OPEN_ISSUE_URL: ${{ steps.act_issue.outputs.open_url }}
          # SP_TELEMETRY_PATH should be provided by the environment if available
          SP_TELEMETRY_PATH: ${{ env.SP_TELEMETRY_PATH }} 
          SP_TOKEN: ${{ secrets.SP_TOKEN }}
          VITE_SP_RESOURCE: ${{ secrets.VITE_SP_RESOURCE || 'https://contoso.sharepoint.com' }}
          VITE_SP_SITE_RELATIVE: ${{ secrets.VITE_SP_SITE_RELATIVE || '/sites/Audit' }}
        run: node scripts/ops/nightly-patrol.mjs

      - name: Assert Telemetry Lanes
        if: ${{ always() }}
        continue-on-error: true
        env:
          SP_TELEMETRY_PATH: ${{ env.SP_TELEMETRY_PATH }}
          CI_READ_QUEUE_THRESHOLD: 1000
          CI_STRICT: "true"
        run: npm run patrol:assert

      - name: Generate metrics dashboard
        run: node scripts/ops/os-metrics.mjs

      - name: Fetch raw summaries
        id: raw_fetch
        if: ${{ always() }}
        env:
          ADMIN_STATUS_RAW_URL: ${{ vars.ADMIN_STATUS_RAW_URL }}
          EXCEPTION_CENTER_RAW_URL: ${{ vars.EXCEPTION_CENTER_RAW_URL }}
          NIGHTLY_RAW_BEARER_TOKEN: ${{ secrets.NIGHTLY_RAW_BEARER_TOKEN }}
          NIGHTLY_RAW_EXTRA_HEADERS_JSON: ${{ secrets.NIGHTLY_RAW_EXTRA_HEADERS_JSON }}
          NIGHTLY_RAW_TIMEOUT_MS: "15000"
          NIGHTLY_RAW_FETCH_STRICT: "false"
        run: node scripts/ops/fetch-nightly-raw-summaries.mjs

      - name: Export /admin/status summary
        id: admin_status
        if: ${{ always() }}
        env:
          ADMIN_STATUS_RAW_PATH: ${{ steps.raw_fetch.outputs.admin_raw_path || env.ADMIN_STATUS_RAW_PATH }}
        run: |
          TODAY=$(date -u +%F)
          OUT="docs/nightly-patrol/admin-status-summary-${TODAY}.json"
          if [ -n "${ADMIN_STATUS_RAW_PATH}" ]; then
            node scripts/ops/export-admin-status-summary.mjs --date "$TODAY" --input "${ADMIN_STATUS_RAW_PATH}" --output "$OUT"
          else
            node scripts/ops/export-admin-status-summary.mjs --date "$TODAY" --output "$OUT"
          fi
          echo "summary_path=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Export ExceptionCenter summary
        id: exception_center
        if: ${{ always() }}
        env:
          EXCEPTION_CENTER_RAW_PATH: ${{ steps.raw_fetch.outputs.exception_raw_path || env.EXCEPTION_CENTER_RAW_PATH }}
        run: |
          TODAY=$(date -u +%F)
          OUT="docs/nightly-patrol/exception-center-summary-${TODAY}.json"
          if [ -n "${EXCEPTION_CENTER_RAW_PATH}" ]; then
            node scripts/ops/export-exception-center-summary.mjs --date "$TODAY" --input "${EXCEPTION_CENTER_RAW_PATH}" --output "$OUT"
          else
            node scripts/ops/export-exception-center-summary.mjs --date "$TODAY" --output "$OUT"
          fi
          echo "summary_path=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Run registry static audit
        if: ${{ always() }}
        run: |
          mkdir -p docs/nightly-patrol
          npx tsx scripts/ops/registry-audit.ts --json-output=docs/nightly-patrol/registry-audit-result.json

      - name: Generate nightly decision
        id: decision
        continue-on-error: true
        env:
          ACT_WARNING_SUMMARY_PATH: /tmp/act-warnings-nightly.json
          LANE_ASSERTION_RESULT_PATH: docs/nightly-patrol/lane-assertion-result.json
          ADMIN_STATUS_SUMMARY_PATH: ${{ steps.admin_status.outputs.summary_path }}
          EXCEPTION_CENTER_SUMMARY_PATH: ${{ steps.exception_center.outputs.summary_path }}
          REGISTRY_AUDIT_SUMMARY_PATH: docs/nightly-patrol/registry-audit-result.json
          LOG_FILE: /tmp/vitest-nightly-act.log
          NIGHTLY_FAIL_ON_ACTION_REQUIRED: "true"
        run: |
          set +e
          node scripts/ops/nightly-decision.mjs
          decision_exit=$?
          echo "exit_code=${decision_exit}" >> "$GITHUB_OUTPUT"
          set -e
          TODAY=$(date -u +%F)
          decision_json="docs/nightly-patrol/decision-${TODAY}.json"
          if [ -f "$decision_json" ]; then
            verdict=$(node -e "const fs=require('node:fs');const p=process.argv[1];const j=JSON.parse(fs.readFileSync(p,'utf8'));console.log(j.final.label);" "$decision_json")
          else
            verdict="unknown"
          fi
          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "decision_md=docs/nightly-patrol/decision-${TODAY}.md" >> "$GITHUB_OUTPUT"

      - name: Nightly decision summary
        if: ${{ always() }}
        run: |
          TODAY=$(date -u +%F)
          FILE="docs/nightly-patrol/decision-${TODAY}.json"
          echo "## Nightly Patrol Decision" >> "$GITHUB_STEP_SUMMARY"
          if [ ! -f "$FILE" ]; then
            echo "- decision: unavailable" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node scripts/ops/nightly-decision-summary.mjs "$FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Index Pressure summary
        if: ${{ always() }}
        run: |
          FILE="docs/nightly-patrol/index-pressure.json"
          echo "## Index Pressure (SharePoint)" >> "$GITHUB_STEP_SUMMARY"
          if [ ! -f "$FILE" ]; then
            echo "- summary: unavailable" >> "$GITHUB_STEP_SUMMARY"
          else
            node scripts/ops/index-pressure-summary.mjs "$FILE" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Auto-create nightly issues
        if: ${{ always() && steps.decision.outputs.verdict == 'action_required' && vars.NIGHTLY_AUTO_ISSUE == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ops/nightly-apply.mjs --apply

      - name: Check M365 remediation credentials
        id: m365_creds
        if: ${{ always() }}
        env:
          AAD_TENANT_ID: ${{ secrets.AAD_TENANT_ID }}
          AAD_APP_ID: ${{ secrets.AAD_APP_ID }}
          SPO_CLIENT_SECRET: ${{ secrets.SPO_CLIENT_SECRET }}
        run: |
          if [ -z "$AAD_TENANT_ID" ] || [ -z "$AAD_APP_ID" ] || [ -z "$SPO_CLIENT_SECRET" ]; then
            echo "::warning::Skipping M365 remediation because credentials are incomplete."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Login to M365 CLI (Remediation Phase)
        if: ${{ always() && steps.m365_creds.outputs.enabled == 'true' }}
        env:
          AAD_TENANT_ID: ${{ secrets.AAD_TENANT_ID }}
          AAD_APP_ID: ${{ secrets.AAD_APP_ID }}
          SPO_CLIENT_SECRET: ${{ secrets.SPO_CLIENT_SECRET }}
        run: |
          npx -y --package @pnp/cli-microsoft365 m365 login --appId "$AAD_APP_ID" --tenant "$AAD_TENANT_ID" --secret "$SPO_CLIENT_SECRET"

      - name: Refresh Drift Ledger
        if: ${{ always() && steps.m365_creds.outputs.enabled == 'true' }}
        run: npm run patrol:ledger
        env:
          VITE_SP_SITE_URL: ${{ vars.VITE_SP_SITE_URL }}

      - name: Zombie Purge Decision Gate (Dry-run)
        id: purge_gate
        if: ${{ always() && steps.m365_creds.outputs.enabled == 'true' }}
        run: |
          npm run patrol:purge -- --batch-size=50
          node scripts/ops/evaluate-purge-auto-confirm.mjs
        env:
          VITE_SP_SITE_URL: ${{ vars.VITE_SP_SITE_URL }}
          ENABLE_ZOMBIE_PURGE_AUTO_EXECUTE: ${{ vars.ENABLE_ZOMBIE_PURGE_AUTO_EXECUTE }}

      - name: Execute Zombie Purge (Autonomous Remediation)
        if: ${{ always() && steps.m365_creds.outputs.enabled == 'true' && steps.purge_gate.outputs.should_execute == 'true' }}
        run: npm run patrol:purge -- --confirm --batch-size=50
        env:
          VITE_SP_SITE_URL: ${{ vars.VITE_SP_SITE_URL }}

      - name: Rebuild Ledger (Post-Remediation)
        if: ${{ always() && steps.m365_creds.outputs.enabled == 'true' && steps.purge_gate.outputs.should_execute == 'true' }}
        run: npm run patrol:ledger
        env:
          VITE_SP_SITE_URL: ${{ vars.VITE_SP_SITE_URL }}

      - name: Generate Purge Report
        if: ${{ always() && steps.m365_creds.outputs.enabled == 'true' }}
        run: node scripts/ops/generate-purge-report.mjs

      - name: Notify on action required
        if: ${{ always() && (steps.decision.outputs.verdict == 'action_required' || steps.purge_gate.outputs.purge_status == 'manual_required') }}
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NIGHTLY_OWNER_WEBHOOKS_JSON: ${{ secrets.NIGHTLY_OWNER_WEBHOOKS_JSON }}
          NIGHTLY_OWNER_MENTIONS_JSON: ${{ secrets.NIGHTLY_OWNER_MENTIONS_JSON }}
          NIGHTLY_OWNER_NOTIFY_STRICT: "false"
          PURGE_STATUS: ${{ steps.purge_gate.outputs.purge_status }}
          PURGE_REASON: ${{ steps.purge_gate.outputs.reason }}
        run: |
          TODAY=$(date -u +%F)
          node scripts/ops/nightly-owner-notify.mjs --decision "docs/nightly-patrol/decision-${TODAY}.json"
          node scripts/notify.mjs --title "🔴 Nightly Patrol: Action Required" --files "docs/nightly-patrol/decision-${TODAY}.md"

      - name: Upload nightly act warning artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-act-warning-${{ github.run_number }}
          path: |
            /tmp/act-warnings-nightly.json
            /tmp/vitest-nightly-act.log
          if-no-files-found: warn

      - name: Upload nightly coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-${{ github.run_number }}
          path: |
            docs/nightly-patrol/coverage-summary.json
            docs/nightly-patrol/lcov.info
          if-no-files-found: ignore

      - name: Upload lane assertion result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lane-assertion-result-${{ github.run_number }}
          path: docs/nightly-patrol/lane-assertion-result.json
          if-no-files-found: ignore

      - name: Upload Guardian Purge Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: guardian-purge-results-${{ github.run_number }}
          path: |
            docs/nightly-patrol/latest-purge-summary.json
            docs/nightly-patrol/deletion-log.json
            docs/nightly-patrol/drift-ledger.csv
          if-no-files-found: ignore

      - name: Nightly act warning summary
        if: ${{ always() }}
        run: |
          {
            echo "## Nightly act(...) warning monitor"
            node scripts/ops/nightly-act-warning-summary.mjs /tmp/act-warnings-nightly.json
            echo "- openIssueCount: **${{ steps.act_issue.outputs.open_count || '0' }}**"
            if [ -n "${{ steps.act_issue.outputs.open_url }}" ]; then
              echo "- openIssue: ${{ steps.act_issue.outputs.open_url }}"
            else
              echo "- openIssue: none"
            fi
            if [ -f /tmp/act-warnings-nightly.json ]; then
              total=$(node -e "const s=require('/tmp/act-warnings-nightly.json');console.log(Number(s.totalWarnings||0));")
              if [ "$total" -eq 0 ]; then
                echo ""
                echo "✅ 0件維持を確認しました。"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Nightly coverage summary
        if: ${{ always() }}
        run: |
          {
            echo "## Nightly coverage monitor"
            if [ -f docs/nightly-patrol/coverage-summary.json ]; then
              pct=$(node -e "const s=require('./docs/nightly-patrol/coverage-summary.json');console.log(s.total.lines.pct)")
              echo "- totalLinesCoverage: **${pct}%**"
              # 閾値 44% と比較
              if [ -n "$pct" ]; then
                is_low=$(node -e "console.log(Number('$pct') < 44)")
                if [ "$is_low" = "true" ]; then
                  echo "⚠️ **WARNING**: Coverage ($pct%) is below threshold (44%)!"
                else
                  echo "✅ Coverage ($pct%) meets threshold (44%)."
                fi
              fi
            else
              echo "- summary: unavailable"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit report if changed
        if: ${{ always() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain -- docs/nightly-patrol src/sharepoint/latest-decision.json)" ]; then
            echo "No report changes"
            exit 0
          fi

          git add -A docs/nightly-patrol src/sharepoint/latest-decision.json
          git commit -m "chore(ops): nightly patrol report"
          git push

      - name: Final Fail Gate
        if: ${{ always() && steps.decision.outputs.exit_code != '0' }}
        run: |
          echo "🔴 Nightly Patrol failed with exit code ${{ steps.decision.outputs.exit_code }}"
          EXIT_CODE="${{ steps.decision.outputs.exit_code }}"
          exit "${EXIT_CODE:-0}"
