name: CI Preflight

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Target ref (branch or tag)'
        required: false
        default: ''

concurrency:
  group: ci-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ids-guard:
    name: Test IDs Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Test IDs guard
        run: npm run guard:testids --silent

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

  preflight-unit:
    name: Preflight Unit (Graph ${{ matrix.graph }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        graph: [ "0", "1" ]
    env:
      CI: true
      VITE_FEATURE_SCHEDULES_GRAPH: ${{ matrix.graph }}
      VITE_SCHEDULES_TZ: "Asia/Tokyo"
      TZ: "Asia/Tokyo"
      VITE_MSAL_CLIENT_ID: dummy-client-id
      VITE_MSAL_TENANT_ID: dummy-tenant-id
      VITE_FEATURE_SCHEDULES: "1"
      # Phase 2: E2E feature flag guards
      E2E_FEATURE_SCHEDULE_NAV: "1"
      E2E_FEATURE_SCHEDULE_ACCEPTANCE: "1"
      E2E_FEATURE_SCHEDULE_WEEK_MONTH_TAB: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Unit required suite
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run test:ci:required

  preflight:
    name: CI Preflight (Aggregator)
    runs-on: ubuntu-latest
    needs: [test-ids-guard, typecheck, lint, preflight-unit]
    if: ${{ always() }}
    steps:
      - name: Verify Preflight components
        run: |
          echo "test-ids-guard result: ${{ needs.test-ids-guard.result }}"
          echo "typecheck result: ${{ needs.typecheck.result }}"
          echo "lint result: ${{ needs.lint.result }}"
          echo "preflight-unit result: ${{ needs.preflight-unit.result }}"

          if [ "${{ needs.test-ids-guard.result }}" != "success" ]; then
            echo "Error: test-ids-guard failed, cancelled, or skipped."
            exit 1
          fi

          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "Error: typecheck failed, cancelled, or skipped."
            exit 1
          fi

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Error: lint failed, cancelled, or skipped."
            exit 1
          fi

          if [ "${{ needs.preflight-unit.result }}" != "success" ]; then
            echo "Error: preflight-unit failed, cancelled, or skipped."
            exit 1
          fi

          echo "All preflight dependencies passed successfully!"

  schedule-unit:
    name: Schedule unit (TZ matrix)
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        tz: ["Asia/Tokyo", "America/Los_Angeles"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Schedule specs (${{ matrix.tz }})
        env:
          CI: true
          VITE_SCHEDULES_TZ: ${{ matrix.tz }}
        run: npx vitest run tests/unit/schedule --reporter=verbose

  e2e:
    name: E2E (Playwright, opt-in)
    runs-on: ubuntu-latest
    needs: [preflight, schedule-unit]
    timeout-minutes: 45
    if: contains(github.event.pull_request.labels.*.name, 'e2e')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps
        name: Install Playwright browsers

      - run: npm run test:e2e -- --reporter=line
        name: Playwright smoke

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/**
            playwright-report/**
