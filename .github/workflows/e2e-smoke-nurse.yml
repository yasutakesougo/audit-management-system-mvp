name: e2e-smoke (nurse)

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
            ${{ runner.os }}-playwright-
      - name: Install Playwright (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 10
        run: npx playwright install-deps chromium
      - name: Run nurse smokes
        env:
          VITE_FEATURE_NURSE_UI: "1"
        run: |
          npm run build --if-present
          npx playwright test tests/e2e/nurse.roster-handshake.spec.ts
          npx playwright test tests/e2e/nurse.query-normalization.spec.ts
          npx playwright test tests/e2e/nurse.sync-status.spec.ts
