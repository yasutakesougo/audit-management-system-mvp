name: Nightly Health

on:
  schedule:
    - cron: '0 18 * * *' # JST 03:00
  workflow_dispatch:
    inputs:
      serial:
        description: Run each shard without file parallelism for comparison
        required: false
        type: boolean
        default: false

jobs:
  static-health:
    name: Static health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:dev

  unit-health:
    name: Unit health (${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run unit tests with memory diagnostics
        env:
          TZ: Asia/Tokyo
          VITEST_MEMORY_LOG: reports/nightly-memory/shard-${{ matrix.shard }}.jsonl
        run: |
          set +e
          set -o pipefail
          extra_args=""
          if [ "${{ inputs.serial }}" = "true" ]; then
            extra_args="--no-file-parallelism"
          fi
          log_path="reports/nightly-memory/shard-${{ matrix.shard }}.log"
          summary_path="reports/nightly-memory/shard-${{ matrix.shard }}-summary.json"
          mkdir -p reports/nightly-memory
          npm run test:ci:nightly -- --shard=${{ matrix.shard }}/3 $extra_args --reporter=./scripts/ci/vitest-memory-reporter.mjs 2>&1 | tee "$log_path"
          vitest_exit_code=${PIPESTATUS[0]}
          node scripts/ci/assert-vitest-health.mjs \
            --log "$log_path" \
            --memory "$VITEST_MEMORY_LOG" \
            --vitest-exit-code "$vitest_exit_code" \
            --summary "$summary_path"
          assertion_exit_code=$?
          if [ "$vitest_exit_code" -ne 0 ] || [ "$assertion_exit_code" -ne 0 ]; then
            exit 1
          fi
      - name: Upload unit memory diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-memory-shard-${{ matrix.shard }}
          path: |
            reports/nightly-memory/shard-${{ matrix.shard }}.log
            reports/nightly-memory/shard-${{ matrix.shard }}.jsonl
            reports/nightly-memory/shard-${{ matrix.shard }}-summary.json
          if-no-files-found: warn

  e2e-health:
    name: E2E health
    needs: [static-health, unit-health]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: E2E (nightly transport critical)
        run: npm run test:e2e:transport:critical
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"

          # Nightly uses SharePoint stubs for robust validation
          VITE_SKIP_SHAREPOINT: "0"
          VITE_ALLOW_SHAREPOINT_OUTSIDE_SPFX: "1"

          # Require-data smoke: catch zero-data regressions
          E2E_REQUIRE_SCHEDULE_DATA: "1"
          # Force stub mode to avoid write tests in nightly
          E2E_SP_STUBS: "1"

          VITE_SP_SCOPE_DEFAULT: ${{ secrets.VITE_SP_SCOPE_DEFAULT }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      - name: E2E (nightly health)
        run: npm run ci:e2e
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"

          # Nightly uses SharePoint stubs for robust validation
          VITE_SKIP_SHAREPOINT: "0"
          VITE_ALLOW_SHAREPOINT_OUTSIDE_SPFX: "1"

          # Require-data smoke: catch zero-data regressions
          E2E_REQUIRE_SCHEDULE_DATA: "1"
          # Force stub mode to avoid write tests in nightly
          E2E_SP_STUBS: "1"

          VITE_SP_SCOPE_DEFAULT: ${{ secrets.VITE_SP_SCOPE_DEFAULT }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}

  perf-health:
    name: Perf health
    needs: [static-health, unit-health]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Perf report (LHCI + Web Vitals)
        run: node scripts/ci/run-perf-with-diagnostics.mjs
        env:
          VITE_E2E: "1"
          VITE_SKIP_LOGIN: "1"
          VITE_E2E_MSAL_MOCK: "1"
          VITE_SKIP_SHAREPOINT: "1"
          VITE_DEMO_MODE: "1"
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      - name: Upload perf summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary
          path: |
            reports/perf-summary.md
            reports/perf-summary.json
            lhci-results.json
            reports/lhci-diagnostics/
            .lighthouseci/
            lhci-artifacts/

  notify-failure:
    name: Notify failure
    needs: [static-health, unit-health, e2e-health, perf-health]
    if: ${{ always() && (needs.static-health.result == 'failure' || needs.unit-health.result == 'failure' || needs.e2e-health.result == 'failure' || needs.perf-health.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify failure
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "notification webhook not configured"
            exit 0
          fi
          payload=$(jq -n --arg repo "${GITHUB_REPOSITORY}" --arg run "${GITHUB_RUN_ID}" --arg url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" '{text: "🚨 Nightly health failed", repository: $repo, runId: $run, url: $url}')
          curl -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

  typecheck-full:
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking for now
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck:full
      - name: Upload typecheck results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-full-errors
          path: |
            package.json
            tsconfig.ci.json
